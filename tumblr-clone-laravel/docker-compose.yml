services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tumbleweed-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - tumbleweed
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: tumbleweed-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tumbleweed
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: tumbleweed-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: tumbleweed
      MYSQL_ROOT_PASSWORD: tumbleweed_root
      MYSQL_USER: tumbleweed
      MYSQL_PASSWORD: tumbleweed_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tumbleweed
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: tumbleweed-pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: tumbleweed
      PMA_PASSWORD: tumbleweed_pass
      UPLOAD_LIMIT: 32M
    ports:
      - "8081:80"
    networks:
      - tumbleweed
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:

networks:
  tumbleweed:
    driver: bridge
