services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mayhem-app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: mayhem
      DB_USERNAME: mayhem
      DB_PASSWORD: mayhem_pass
    volumes:
      - .:/var/www
      - /var/www/vendor
      - ./docker/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - mayhem
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: mayhem-nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mayhem
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: mayhem-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mayhem
      MYSQL_ROOT_PASSWORD: mayhem_root
      MYSQL_USER: mayhem
      MYSQL_PASSWORD: mayhem_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mayhem
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: mayhem-pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: mayhem
      PMA_PASSWORD: mayhem_pass
      UPLOAD_LIMIT: 32M
    ports:
      - "8081:80"
    networks:
      - mayhem
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:

networks:
  mayhem:
    driver: bridge
